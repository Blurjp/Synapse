[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts = -v --strict-markers --tb=short --cov=app --cov-report=term-missing

[coverage:run]
source = app
omit = */tests/*,*/__pycache__/*

[coverage:report]
precision = 2
show_missing = True
