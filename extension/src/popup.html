<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Synapse - Save to Synapse</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z" fill="#0ea5e9"/>
        </svg>
        <span class="logo-text">Synapse</span>
      </div>
      <div class="status" id="status">
        <span class="status-dot"></span>
        <span class="status-text">Connected</span>
      </div>
    </div>

    <!-- Current Page -->
    <div class="section">
      <h3>Current Page</h3>
      <div class="page-info" id="pageInfo">
        <div class="page-title" id="pageTitle">Loading...</div>
        <div class="page-url" id="pageUrl"></div>
      </div>
      <button class="btn btn-primary" id="savePage">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z" fill="currentColor"/>
        </svg>
        Save to Synapse
      </button>
    </div>

    <!-- Selection -->
    <div class="section" id="selectionSection" style="display: none;">
      <h3>Selected Text</h3>
      <div class="selection-preview" id="selectionPreview"></div>
      <button class="btn btn-secondary" id="saveSelection">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M17 3H7c-1.1 0-2 .9-2 2v16l7-3 7 3V5c0-1.1-.9-2-2-2z" fill="currentColor"/>
        </svg>
        Save Highlight
      </button>
    </div>

    <!-- Quick Note -->
    <div class="section">
      <h3>Quick Note</h3>
      <textarea class="note-input" id="noteInput" placeholder="Add a note..."></textarea>
      <button class="btn btn-secondary" id="saveNote">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z" fill="currentColor"/>
        </svg>
        Save Note
      </button>
    </div>

    <!-- Recent Saves -->
    <div class="section">
      <h3>Recent Saves</h3>
      <div class="recent-list" id="recentList">
        <div class="empty-state">No recent saves</div>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <a href="#" id="openDashboard">Open Synapse</a>
      <a href="#" id="settings">Settings</a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
