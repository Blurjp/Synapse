<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0284c7;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glow effect -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Background circle with gradient -->
  <circle cx="512" cy="512" r="480" fill="url(#bgGradient)" filter="url(#shadow)"/>
  
  <!-- Outer ring -->
  <circle cx="512" cy="512" r="400" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
  
  <!-- Neural network nodes -->
  <g filter="url(#glow)">
    <!-- Center node -->
    <circle cx="512" cy="512" r="60" fill="white"/>
    
    <!-- Inner ring nodes -->
    <circle cx="512" cy="312" r="45" fill="white" fill-opacity="0.95"/>
    <circle cx="685" cy="412" r="45" fill="white" fill-opacity="0.95"/>
    <circle cx="685" cy="612" r="45" fill="white" fill-opacity="0.95"/>
    <circle cx="512" cy="712" r="45" fill="white" fill-opacity="0.95"/>
    <circle cx="339" cy="612" r="45" fill="white" fill-opacity="0.95"/>
    <circle cx="339" cy="412" r="45" fill="white" fill-opacity="0.95"/>
    
    <!-- Outer ring nodes -->
    <circle cx="512" cy="180" r="35" fill="white" fill-opacity="0.8"/>
    <circle cx="762" cy="322" r="35" fill="white" fill-opacity="0.8"/>
    <circle cx="762" cy="702" r="35" fill="white" fill-opacity="0.8"/>
    <circle cx="512" cy="844" r="35" fill="white" fill-opacity="0.8"/>
    <circle cx="262" cy="702" r="35" fill="white" fill-opacity="0.8"/>
    <circle cx="262" cy="322" r="35" fill="white" fill-opacity="0.8"/>
  </g>
  
  <!-- Connection lines -->
  <g stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.6">
    <!-- Inner connections -->
    <line x1="512" y1="512" x2="512" y2="312"/>
    <line x1="512" y1="512" x2="685" y2="412"/>
    <line x1="512" y1="512" x2="685" y2="612"/>
    <line x1="512" y1="512" x2="512" y2="712"/>
    <line x1="512" y1="512" x2="339" y2="612"/>
    <line x1="512" y1="512" x2="339" y2="412"/>
    
    <!-- Inner ring connections -->
    <line x1="512" y1="312" x2="685" y2="412"/>
    <line x1="685" y1="412" x2="685" y2="612"/>
    <line x1="685" y1="612" x2="512" y2="712"/>
    <line x1="512" y1="712" x2="339" y2="612"/>
    <line x1="339" y1="612" x2="339" y2="412"/>
    <line x1="339" y1="412" x2="512" y2="312"/>
    
    <!-- Outer connections -->
    <line x1="512" y1="312" x2="512" y2="180"/>
    <line x1="685" y1="412" x2="762" y2="322"/>
    <line x1="685" y1="612" x2="762" y2="702"/>
    <line x1="512" y1="712" x2="512" y2="844"/>
    <line x1="339" y1="612" x2="262" y2="702"/>
    <line x1="339" y1="412" x2="262" y2="322"/>
  </g>
  
  <!-- Pulse animation dots -->
  <g fill="white" opacity="0.4">
    <circle cx="620" cy="362" r="12"/>
    <circle cx="420" cy="662" r="12"/>
    <circle cx="620" cy="662" r="12"/>
  </g>
  
  <!-- Center glow -->
  <circle cx="512" cy="512" r="100" fill="white" opacity="0.1"/>
</svg>
