<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A855F7"/>
      <stop offset="50%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#3B82F6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bgGrad)"/>

  <!-- Stylized "S" for Synapse -->
  <g fill="white" opacity="0.95">
    <!-- S shape representing brain/synapse connection -->
    <path d="M22 8 C18 8 16 10 16 12 C16 14 18 15 20 16 C22 17 24 18 24 20 C24 22 22 24 18 24 C14 24 12 22 10 20"
          stroke="white" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.9"/>

    <!-- Connection nodes -->
    <circle cx="10" cy="12" r="2"/>
    <circle cx="22" cy="20" r="2"/>
    <circle cx="16" cy="16" r="1.5"/>
  </g>
</svg>
