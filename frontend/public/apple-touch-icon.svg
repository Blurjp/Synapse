<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A855F7"/>
      <stop offset="50%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#3B82F6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#7C3AED" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="180" height="180" rx="38" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Brain/Synapse Shape -->
  <g fill="white" opacity="0.95">
    <!-- Left hemisphere -->
    <path d="M63 56
             C49 56 42 70 42 84
             C42 98 49 112 63 119
             C56 126 56 133 63 140
             L70 133
             C63 126 63 119 70 112
             C56 105 52 95 52 84
             C52 73 56 63 70 60
             C63 56 63 56 63 56Z"/>

    <!-- Right hemisphere -->
    <path d="M117 56
             C131 56 138 70 138 84
             C138 98 131 112 117 119
             C124 126 124 133 117 140
             L110 133
             C117 126 117 119 110 112
             C124 105 128 95 128 84
             C128 73 124 63 110 60
             C117 56 117 56 117 56Z"/>

    <!-- Center connection -->
    <ellipse cx="90" cy="91" rx="21" ry="28" opacity="0.9"/>

    <!-- Neural connections -->
    <circle cx="70" cy="70" r="4"/>
    <circle cx="110" cy="70" r="4"/>
    <circle cx="63" cy="98" r="3.5"/>
    <circle cx="117" cy="98" r="3.5"/>
    <circle cx="90" cy="63" r="3"/>
    <circle cx="90" cy="119" r="3"/>

    <!-- Connection lines -->
    <line x1="70" y1="70" x2="90" y2="63" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <line x1="110" y1="70" x2="90" y2="63" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <line x1="63" y1="98" x2="90" y2="91" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <line x1="117" y1="98" x2="90" y2="91" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  </g>
</svg>
