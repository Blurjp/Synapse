<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E3F2FD"/>
      <stop offset="100%" style="stop-color:#BBDEFB"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2196F3"/>
      <stop offset="100%" style="stop-color:#0D6EFD"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="180" height="180" rx="36" fill="url(#bgGrad)"/>

  <!-- Synapse Network Icon -->
  <g>
    <!-- Central node -->
    <circle cx="90" cy="90" r="14" fill="url(#iconGrad)"/>

    <!-- Outer nodes -->
    <circle cx="56" cy="63" r="10" fill="url(#iconGrad)"/>
    <circle cx="124" cy="63" r="10" fill="url(#iconGrad)"/>
    <circle cx="49" cy="113" r="10" fill="url(#iconGrad)"/>
    <circle cx="131" cy="113" r="10" fill="url(#iconGrad)"/>

    <!-- Connection lines -->
    <line x1="90" y1="90" x2="56" y2="63" stroke="#0D6EFD" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
    <line x1="90" y1="90" x2="124" y2="63" stroke="#0D6EFD" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
    <line x1="90" y1="90" x2="49" y2="113" stroke="#0D6EFD" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
    <line x1="90" y1="90" x2="131" y2="113" stroke="#0D6EFD" stroke-width="3" stroke-linecap="round" opacity="0.6"/>

    <!-- Cross connections -->
    <line x1="56" y1="63" x2="124" y2="63" stroke="#0D6EFD" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
    <line x1="49" y1="113" x2="131" y2="113" stroke="#0D6EFD" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
    <line x1="56" y1="63" x2="49" y2="113" stroke="#0D6EFD" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
    <line x1="124" y1="63" x2="131" y2="113" stroke="#0D6EFD" stroke-width="2" stroke-linecap="round" opacity="0.4"/>

    <!-- Node highlights -->
    <circle cx="90" cy="90" r="5" fill="white" opacity="0.3"/>
    <circle cx="56" cy="63" r="3.5" fill="white" opacity="0.3"/>
    <circle cx="124" cy="63" r="3.5" fill="white" opacity="0.3"/>
    <circle cx="49" cy="113" r="3.5" fill="white" opacity="0.3"/>
    <circle cx="131" cy="113" r="3.5" fill="white" opacity="0.3"/>
  </g>
</svg>
