<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E3F2FD"/>
      <stop offset="100%" style="stop-color:#BBDEFB"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2196F3"/>
      <stop offset="100%" style="stop-color:#0D6EFD"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0D6EFD" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bgGrad)"/>

  <!-- Synapse Network Icon -->
  <g filter="url(#shadow)">
    <!-- Central node -->
    <circle cx="256" cy="256" r="40" fill="url(#iconGrad)"/>

    <!-- Outer nodes -->
    <circle cx="160" cy="180" r="28" fill="url(#iconGrad)"/>
    <circle cx="352" cy="180" r="28" fill="url(#iconGrad)"/>
    <circle cx="140" cy="320" r="28" fill="url(#iconGrad)"/>
    <circle cx="372" cy="320" r="28" fill="url(#iconGrad)"/>

    <!-- Connection lines -->
    <line x1="256" y1="256" x2="160" y2="180" stroke="#0D6EFD" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
    <line x1="256" y1="256" x2="352" y2="180" stroke="#0D6EFD" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
    <line x1="256" y1="256" x2="140" y2="320" stroke="#0D6EFD" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
    <line x1="256" y1="256" x2="372" y2="320" stroke="#0D6EFD" stroke-width="8" stroke-linecap="round" opacity="0.6"/>

    <!-- Cross connections -->
    <line x1="160" y1="180" x2="352" y2="180" stroke="#0D6EFD" stroke-width="5" stroke-linecap="round" opacity="0.4"/>
    <line x1="140" y1="320" x2="372" y2="320" stroke="#0D6EFD" stroke-width="5" stroke-linecap="round" opacity="0.4"/>
    <line x1="160" y1="180" x2="140" y2="320" stroke="#0D6EFD" stroke-width="5" stroke-linecap="round" opacity="0.4"/>
    <line x1="352" y1="180" x2="372" y2="320" stroke="#0D6EFD" stroke-width="5" stroke-linecap="round" opacity="0.4"/>

    <!-- Node highlights -->
    <circle cx="256" cy="256" r="15" fill="white" opacity="0.3"/>
    <circle cx="160" cy="180" r="10" fill="white" opacity="0.3"/>
    <circle cx="352" cy="180" r="10" fill="white" opacity="0.3"/>
    <circle cx="140" cy="320" r="10" fill="white" opacity="0.3"/>
    <circle cx="372" cy="320" r="10" fill="white" opacity="0.3"/>
  </g>
</svg>
